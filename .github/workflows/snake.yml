name: 🐍 Generate Snake Animation (Advanced)

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main   # auto update on push

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 📥 Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚡ Cache GitHub contribution data (faster runs)
      - name: Cache Contributions
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: snake-cache-${{ github.run_id }}
          restore-keys: snake-cache-

      # 🐍 Generate Snake Animation (multiple themes)
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-blue.svg?color_snake=#58a6ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-snake-rainbow.svg?palette=github

      # 🧹 Clean old files before deploy
      - name: Clean dist folder
        run: rm -rf dist/*.tmp || true

      # 🚀 Deploy to GitHub Pages (output branch)
      - name: Deploy Snake Animation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "🐍 Update snake animation"

      # 📊 Add summary (visible in Actions UI)
      - name: Job Summary
        run: |
          echo "## 🐍 Snake Animation Generated!" >> $GITHUB_STEP_SUMMARY
          echo "- Light Theme ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Dark Theme ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Blue Theme ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Rainbow Theme ✅" >> $GITHUB_STEP_SUMMARY
